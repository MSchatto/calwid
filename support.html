<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalWid Support</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:#f5f5f7;
    margin:0;
    padding:40px;
    color:#1d1d1f;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.langswitch{
    text-align:right;
    margin-bottom:20px;
}

button{
    padding:6px 12px;
    margin-left:6px;
    border-radius:6px;
    border:1px solid #ccc;
    background:white;
    cursor:pointer;
}

button:hover{
    background:#f0f0f0;
}
</style>

<script>
function setLang(lang){
    document.querySelectorAll(".lang").forEach(el=>{
        el.style.display="none";
    });
    document.querySelectorAll("." + lang).forEach(el=>{
        el.style.display="block";
    });
}
</script>

</head>

<body onload="setLang('de')">

<div class="container">

<div class="langswitch">
<button onclick="setLang('de')">Deutsch</button>
<button onclick="setLang('en')">English</button>
</div>

<div class="lang de">
<h1>CalWid Support</h1>

<p>
Bei Fragen, Problemen oder Feedback zur App CalWid kontaktieren Sie bitte:
</p>

<p>
E-Mail: <a href="mailto:calwid@gmx.de">calwid@gmx.de</a>
</p>

<p>
Wir helfen Ihnen gerne weiter.
</p>
</div>

<div class="lang en" style="display:none">

<h1>CalWid Support</h1>

<p>
If you have questions, problems, or feedback about the CalWid app, please contact:
</p>

<p>
Email: <a href="mailto:calwid@gmx.de">calwid@gmx.de</a>
</p>

<p>
We will be happy to help you.
</p>

</div>

</div>

</body>
</html>
